services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-compliance
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-compliance}
      POSTGRES_USER: ${POSTGRES_USER:-compliance_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-compliance_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - compliance-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-compliance_user} -d ${POSTGRES_DB:-compliance}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-compliance
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - compliance-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  app:
    build: .
    container_name: compliance-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-compliance}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-compliance_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-compliance_pass}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-change-me-12345}
    networks:
      - compliance-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres-data:

networks:
  compliance-net:
    driver: bridge
