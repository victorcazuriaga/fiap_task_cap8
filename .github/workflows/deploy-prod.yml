name: Deploy - Production

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      source_tag:
        description: 'Image tag already present in ACR to promote (ex: staging-abc1234). Deixe em branco para buildar o HEAD.'
        required: false

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  IMAGE_REPO: compliance
  ACR_LOGIN_SERVER: fiapdevops.azurecr.io
  ACR_NAME: fiapdevops

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run tests
        run: ./mvnw -B -ntp test -Dspring.profiles.active=test

  build-and-push:
    name: Build and push image to ACR
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name $ACR_NAME

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag
        id: tag
        run: |
          if [ -n "${{ inputs.source_tag }}" ]; then
            echo "value=${{ inputs.source_tag }}" >> $GITHUB_OUTPUT
            echo "skip_build=true" >> $GITHUB_OUTPUT
          elif [ "${GITHUB_REF}" != "${GITHUB_REF##refs/tags/}" ]; then
            echo "value=${GITHUB_REF##refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "value=prod-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        if: steps.tag.outputs.skip_build != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPO }}:prod
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPO }}:${{ steps.tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Promote existing tag to :prod
        if: steps.tag.outputs.skip_build == 'true'
        run: |
          az acr import \
            --name $ACR_NAME \
            --source $ACR_LOGIN_SERVER/$IMAGE_REPO:${{ steps.tag.outputs.value }} \
            --image $IMAGE_REPO:prod \
            --force

  deploy:
    name: Deploy to VM (production)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
      url: http://${{ vars.VM_HOST }}:8081/actuator/health
    steps:
      - name: Sync docker-compose to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.VM_HOST }}
          username: ${{ vars.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          source: deploy/docker-compose.yaml
          target: /opt/compliance/prod/
          strip_components: 1

      - name: Run deploy on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.VM_HOST }}
          username: ${{ vars.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script: /usr/local/bin/deploy.sh prod ${{ needs.build-and-push.outputs.image_tag }}

      - name: Health check
        run: |
          set -e
          url="http://${{ vars.VM_HOST }}:8081/actuator/health"
          for i in {1..20}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url" || true)
            echo "attempt $i → $status"
            [ "$status" = "200" ] && exit 0
            sleep 15
          done
          echo "health check failed" && exit 1
