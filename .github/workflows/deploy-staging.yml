name: Deploy - Staging

on:
  push:
    branches: [development]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  IMAGE_REPO: compliance
  ACR_LOGIN_SERVER: fiapdevops.azurecr.io
  ACR_NAME: fiapdevops

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run tests
        run: ./mvnw -B -ntp test -Dspring.profiles.active=test

  build-and-push:
    name: Build and push image to ACR
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name $ACR_NAME

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag
        id: tag
        run: echo "value=staging-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPO }}:staging
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPO }}:${{ steps.tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VM (staging)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: http://${{ vars.VM_HOST }}:8080/actuator/health
    steps:
      - name: Sync docker-compose to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.VM_HOST }}
          username: ${{ vars.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          source: deploy/docker-compose.yaml
          target: /opt/compliance/staging/
          strip_components: 1

      - name: Run deploy on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.VM_HOST }}
          username: ${{ vars.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script: /usr/local/bin/deploy.sh staging ${{ needs.build-and-push.outputs.image_tag }}

      - name: Health check
        run: |
          set -e
          url="http://${{ vars.VM_HOST }}:8080/actuator/health"
          for i in {1..20}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url" || true)
            echo "attempt $i → $status"
            [ "$status" = "200" ] && exit 0
            sleep 15
          done
          echo "health check failed" && exit 1
