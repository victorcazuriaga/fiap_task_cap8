# ===== DEV PROFILE (local development) =====

# PostgreSQL (local docker-compose by default)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/compliance}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:compliance_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:compliance_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# RabbitMQ
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

# JWT (dev fallback only — NEVER use in staging/prod)
api.security.token.secret=${JWT_SECRET:dev-only-secret-change-me-12345}

# Logging
logging.level.root=INFO
logging.level.br.com.ecogov.compliance=DEBUG

# Actuator (dev: expose more for debugging)
management.endpoints.web.exposure.include=health,info,metrics,env,beans,mappings
management.endpoint.health.show-details=always

# Swagger / OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
