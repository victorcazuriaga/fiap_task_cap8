# ===== TEST PROFILE (CI and local tests) =====
# Uses H2 in-memory database to avoid Oracle dependency in CI.

spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa

# JPA: let Hibernate create the schema (H2 in postgres-compat mode, no migration)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable Flyway in tests (schema is managed by Hibernate)
spring.flyway.enabled=false

# RabbitMQ disabled in tests
spring.rabbitmq.listener.simple.auto-startup=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# JWT secret for tests
api.security.token.secret=test-secret-key-for-unit-and-integration-tests-only

# Minimal logging in tests
logging.level.root=WARN
logging.level.br.com.ecogov.compliance=INFO
